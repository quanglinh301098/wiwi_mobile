<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mowin Tech Co., Ltd. - Giải pháp Công nghệ Đột phá</title>
    <meta name="description"
        content="Mowin Tech Co., Ltd. cung cấp các giải pháp công nghệ tiên tiến: phát triển phần mềm tùy chỉnh, ứng dụng web & mobile, AI, và Cloud & DevOps.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #05050A;
            --bg2: #090B14;
            --purple: #00f0ff;
            --blue: #0047ff;
            --cyan: #00ffcc;
            --text: #f0f0f0;
            --text2: #a0a0b0;
            --text3: #6b7280;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1)
        }

        html {
            scroll-behavior: smooth
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            line-height: 1.6
        }

        ::-webkit-scrollbar {
            width: 8px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--purple), var(--blue));
            border-radius: 4px
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--purple), var(--blue), var(--cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px
        }

        .glow-neon {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4), 0 0 30px rgba(0, 71, 255, 0.2)
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px
        }

        section {
            padding: 100px 0
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            transition: all .3s
        }

        nav.scrolled {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border)
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none
        }

        .nav-links {
            display: flex;
            gap: 4px;
            list-style: none
        }

        .nav-links a {
            color: var(--text2);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: .9rem;
            transition: all .2s
        }

        .nav-links a:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05)
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .lang-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            font-size: .85rem;
            font-weight: 500;
            transition: all .2s;
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center
        }

        .lang-btn:hover {
            color: var(--text);
            border-color: var(--purple)
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            min-width: 44px;
            min-height: 44px;
            align-items: center;
            justify-content: center
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all .3s
        }

        .mobile-menu {
            display: none;
            position: absolute;
            top: 64px;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px
        }

        .mobile-menu.open {
            display: block
        }

        .mobile-menu a {
            display: block;
            color: var(--text2);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 8px;
            transition: all .2s
        }

        .mobile-menu a:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05)
        }

        /* ── HERO ── */
        #hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(-45deg, #05050A, #001B3D, #090B14, #002D3D);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 0 20px
        }

        .hero-content h1 {
            font-size: clamp(2.2rem, 5vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 24px
        }

        .hero-content p {
            font-size: clamp(1rem, 2vw, 1.35rem);
            color: var(--text2);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto
        }

        .hero-btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: .95rem;
            cursor: pointer;
            transition: all .3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            border: none;
            font-family: inherit
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple), var(--blue), var(--cyan));
            color: #fff
        }

        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.5), 0 0 50px rgba(59, 130, 246, 0.3);
            transform: scale(1.05)
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: #fff
        }

        .btn-secondary:hover {
            border-color: var(--purple);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
            transform: scale(1.05)
        }

        /* ── ABOUT ── */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: center
        }

        .about-text h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 20px
        }

        .about-text p {
            color: var(--text2);
            font-size: 1.05rem
        }

        .about-orb {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            position: relative
        }

        .about-orb .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 71, 255, 0.2), rgba(0, 255, 204, 0.2));
            filter: blur(30px);
            animation: pulse 3s ease-in-out infinite
        }

        .about-orb .core {
            position: absolute;
            inset: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--blue), var(--cyan));
            opacity: .4;
            filter: blur(15px)
        }

        .about-orb .center {
            position: absolute;
            inset: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15)
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1
            }

            50% {
                transform: scale(1.05);
                opacity: .8
            }
        }

        /* ── SERVICES ── */
        .section-title {
            text-align: center;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 60px
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px
        }

        .service-card {
            padding: 32px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            transition: all .3s
        }

        .service-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.2)
        }

        .service-icon {
            font-size: 2.5rem;
            margin-bottom: 16px
        }

        .service-card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 10px
        }

        .service-card p {
            color: var(--text2);
            font-size: .95rem;
            line-height: 1.6
        }

        /* ── PROJECTS ── */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px
        }

        .project-card {
            border-radius: 16px;
            overflow: hidden;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            transition: all .3s
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.2)
        }

        .project-img {
            height: 160px;
            position: relative;
            overflow: hidden
        }

        .project-img .overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 15, 0.8);
            opacity: 0;
            transition: opacity .3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px
        }

        .project-card:hover .overlay {
            opacity: 1
        }

        .overlay p {
            color: var(--text2);
            font-size: .9rem;
            text-align: center
        }

        .project-body {
            padding: 20px
        }

        .project-body h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .project-body p {
            color: var(--text2);
            font-size: .9rem;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px
        }

        .tech-tag {
            font-size: .75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--cyan);
            border: 1px solid var(--border)
        }

        /* ── WHY US ── */
        .whyus-points {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 48px
        }

        .point-card {
            display: flex;
            gap: 16px;
            padding: 24px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            transition: all .3s
        }

        .point-card:hover {
            border-color: rgba(0, 240, 255, 0.3)
        }

        .point-icon {
            font-size: 2rem;
            flex-shrink: 0
        }

        .point-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px
        }

        .point-card p {
            color: var(--text2);
            font-size: .9rem
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 32px;
            text-align: center
        }

        .stat-number {
            font-size: clamp(2.5rem, 4vw, 3.5rem);
            font-weight: 800
        }

        .stat-label {
            color: var(--text2);
            font-size: .9rem;
            margin-top: 4px
        }

        /* ── TESTIMONIALS ── */
        .testimonial-carousel {
            max-width: 700px;
            margin: 0 auto;
            position: relative
        }

        .testimonial-card {
            padding: 40px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border)
        }

        .testimonial-quote {
            font-size: 2rem;
            color: rgba(0, 240, 255, 0.4);
            margin-bottom: 12px
        }

        .testimonial-content {
            color: var(--text2);
            font-size: 1.05rem;
            font-style: italic;
            line-height: 1.7;
            margin-bottom: 24px
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 14px
        }

        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: .85rem;
            flex-shrink: 0
        }

        .author-name {
            font-weight: 600;
            font-size: .95rem
        }

        .author-role {
            color: var(--text3);
            font-size: .8rem
        }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 32px
        }

        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            cursor: pointer;
            transition: all .3s;
            padding: 0
        }

        .carousel-dot.active {
            background: var(--purple);
            width: 24px;
            border-radius: 5px
        }

        .carousel-arrows {
            position: absolute;
            top: 50%;
            left: -60px;
            right: -60px;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
            pointer-events: none
        }

        .carousel-arrow {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            pointer-events: auto;
            font-size: 1.2rem
        }

        .carousel-arrow:hover {
            color: var(--text);
            border-color: rgba(0, 240, 255, 0.4)
        }

        /* ── CONTACT ── */
        .contact-form {
            max-width: 560px;
            margin: 0 auto;
            padding: 32px;
            border-radius: 16px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border)
        }

        .form-group {
            margin-bottom: 20px
        }

        .form-group label {
            display: block;
            color: var(--text2);
            font-size: .9rem;
            margin-bottom: 6px
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all .3s;
            resize: vertical
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.3), 0 0 20px rgba(0, 240, 255, 0.15)
        }

        .form-group .error {
            color: #f87171;
            font-size: .85rem;
            margin-top: 4px;
            display: none
        }

        .form-group.has-error input,
        .form-group.has-error textarea {
            border-color: #f87171
        }

        .form-group.has-error .error {
            display: block
        }

        .form-submit {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--purple), var(--blue), var(--cyan));
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: opacity .2s;
            font-family: inherit;
            min-height: 44px
        }

        .form-submit:hover {
            opacity: .9
        }

        .form-success {
            display: none;
            text-align: center;
            padding: 40px
        }

        .form-success .check {
            font-size: 3rem;
            margin-bottom: 16px
        }

        .form-success p {
            font-size: 1.1rem
        }

        .form-success button {
            margin-top: 20px;
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: .9rem;
            font-family: inherit
        }

        .form-success button:hover {
            color: var(--purple)
        }

        /* ── FOOTER ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 48px 0
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 24px
        }

        .footer-info {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .footer-logo {
            font-size: 1.5rem;
            font-weight: 800
        }

        .footer-contact {
            color: var(--text2);
            font-size: .9rem
        }

        .social-links {
            display: flex;
            gap: 12px
        }

        .social-link {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            transition: all .3s;
            border-radius: 50%
        }

        .social-link:hover {
            color: var(--text);
            transform: scale(1.15);
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.6))
        }

        .footer-copy {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text3);
            font-size: .85rem
        }

        /* ── ANIMATIONS ── */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: all .7s cubic-bezier(.25, .1, .25, 1)
        }

        .fade-up.visible {
            opacity: 1;
            transform: translateY(0)
        }

        .fade-left {
            opacity: 0;
            transform: translateX(-60px);
            transition: all .7s cubic-bezier(.25, .1, .25, 1)
        }

        .fade-left.visible {
            opacity: 1;
            transform: translateX(0)
        }

        .fade-right {
            opacity: 0;
            transform: translateX(60px);
            transition: all .7s cubic-bezier(.25, .1, .25, 1)
        }

        .fade-right.visible {
            opacity: 1;
            transform: translateX(0)
        }

        /* ── LOADING ── */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity .6s
        }

        #loading.hide {
            opacity: 0;
            pointer-events: none
        }

        #loading .logo {
            font-size: 3rem;
            font-weight: 800;
            animation: loadPulse 2s ease-in-out infinite
        }

        @keyframes loadPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .7;
                transform: scale(1.08)
            }
        }

        /* ── RESPONSIVE ── */
        @media(max-width:1024px) {

            .services-grid,
            .projects-grid {
                grid-template-columns: repeat(2, 1fr)
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr)
            }

            .carousel-arrows {
                display: none
            }
        }

        @media(max-width:768px) {
            .nav-links {
                display: none
            }

            .hamburger {
                display: flex
            }

            .about-grid {
                grid-template-columns: 1fr
            }

            .services-grid,
            .projects-grid {
                grid-template-columns: 1fr
            }

            .whyus-points {
                grid-template-columns: 1fr
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr)
            }

            section {
                padding: 60px 0
            }
        }

        @media(prefers-reduced-motion:reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                transition-duration: .01ms !important
            }

            html {
                scroll-behavior: auto
            }
        }
    </style>
</head>

<body>

    <!-- Loading -->
    <div id="loading">
        <div class="logo gradient-text">Mowin Tech Co., Ltd.</div>
    </div>

    <!-- Nav -->
    <nav id="nav">
        <div class="nav-inner">
            <a class="nav-logo gradient-text" onclick="scrollTo(0,0)">Mowin Tech Co., Ltd.</a>
            <ul class="nav-links" id="navLinks"></ul>
            <div class="nav-right">
                <button class="lang-btn" id="langBtn" onclick="toggleLang()"></button>
                <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <div class="mobile-menu" id="mobileMenu"></div>
    </nav>

    <!-- Hero -->
    <section id="hero">
        <div class="hero-bg"></div>
        <div class="hero-content fade-up">
            <h1 class="gradient-text" data-i18n="hero.title"></h1>
            <p data-i18n="hero.subtitle"></p>

        function t(key) {
            const keys = key.split('.');

            return typeof val === 'string' ? val : key;
        }

        function applyI18n() {

        // ── Animated Counters ──
        function animateCounters() {
            document.querySelectorAll('.stat-number[data-target]').forEach(el => {
                if (el.dataset.counted) return;
                const rect = el.getBoundingClientRect();
                if (rect.top > window.innerHeight) return;
                el.dataset.counted = '1';
                const target = +el.dataset.target;
                const suffix = el.dataset.suffix;
                const duration = 2000;
                const start = performance.now();
                function step(now) {
                    const p = Math.min((now - start) / duration, 1);
                    const eased = 1 - Math.pow(1 - p, 3);
                    el.textContent = Math.round(eased * target) + suffix;
                    if (p < 1) requestAnimationFrame(step);
                    else el.textContent = target + suffix;
                }
                requestAnimationFrame(step);
            });
        }

            ).join('');
        }
        function nextTestimonial() { currentTestimonial = (currentTestimonial + 1) % 3; showTestimonial(currentTestimonial); }
        function prevTestimonial() { currentTestimonial = (currentTestimonial + 2) % 3; showTestimonial(currentTestimonial); }
        function goToTestimonial(i) { currentTestimonial = i; showTestimonial(i); }

        // Autoplay
        function startAutoplay() { autoplayTimer = setInterval(nextTestimonial, 5000); }
        function stopAutoplay() { clearInterval(autoplayTimer); }
        document.getElementById('carousel').addEventListener('mouseenter', stopAutoplay);
        document.getElementById('carousel').addEventListener('mouseleave', startAutoplay);
        document.getElementById('carousel').addEventListener('touchstart', stopAutoplay, { passive: true });
        document.getElementById('carousel').addEventListener('touchend', startAutoplay, { passive: true });

        // ── Contact Form ──
        document.getElementById('contactForm').addEventListener('submit', function (e) {
            e.preventDefault();
            let valid = true;
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const msg = document.getElementById('message').value.trim();

            document.getElementById('fg-fullName').classList.toggle('has-error', !name);
            if (!name) valid = false;

            const emailErr = document.getElementById('emailError');
            if (!email) {
                emailErr.textContent = t('contact.errors.emailRequired');
                document.getElementById('fg-email').classList.add('has-error');
                valid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                emailErr.textContent = t('contact.errors.emailInvalid');
                document.getElementById('fg-email').classList.add('has-error');
                valid = false;
            } else {
                document.getElementById('fg-email').classList.remove('has-error');
            }

            document.getElementById('fg-message').classList.toggle('has-error', !msg);
            if (!msg) valid = false;

            if (valid) {
                document.getElementById('contactForm').style.display = 'none';
                document.getElementById('formSuccess').style.display = 'block';
            }
        });

        function resetForm() {
            document.getElementById('contactForm').reset();
            document.getElementById('contactForm').style.display = 'block';
            document.getElementById('formSuccess').style.display = 'none';
            document.querySelectorAll('.form-group').forEach(g => g.classList.remove('has-error'));
        }

        // ── Scroll Animations ──
        function checkAnimations() {
            document.querySelectorAll('.fade-up,.fade-left,.fade-right').forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight - 80) el.classList.add('visible');
            });
            animateCounters();
        }
        window.addEventListener('scroll', checkAnimations, { passive: true });

        // ── Init ──
        window.addEventListener('DOMContentLoaded', () => {
            applyI18n();
            startAutoplay();
            setTimeout(() => {
                document.getElementById('loading').classList.add('hide');
                checkAnimations();
            }, 1500);
        });
    </script>
</body>

</html>
